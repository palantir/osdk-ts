<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        if (window.parent === window) return;

        function post(data) {
          data.source = "osdk-preview";
          try { window.parent.postMessage(data, "*"); } catch (_) {}
        }

        function appHasContent() {
          var root = document.getElementById("root");
          return root != null && root.childElementCount > 0;
        }

        function reportIfBlank(data) {
          setTimeout(function () {
            if (appHasContent()) return;
            post(data);
          }, 0);
        }

        window.addEventListener("error", function (e) {
          reportIfBlank({
            kind: "error",
            message: e.message,
            filename: e.filename,
            lineno: e.lineno,
            colno: e.colno,
            stack: e.error && e.error.stack,
          });
        });

        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          reportIfBlank({
            kind: "unhandledrejection",
            message: String((r && r.message) || r),
            stack: r && r.stack,
          });
        });

        post({ kind: "ready" });
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/react.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="osdk-clientId" content="%VITE_FOUNDRY_CLIENT_ID%" />
    <meta name="osdk-redirectUrl" content="%VITE_FOUNDRY_REDIRECT_URL%" />
    <meta name="osdk-foundryUrl" content="%VITE_FOUNDRY_API_URL%" />
    <meta name="osdk-ontologyRid" content="%VITE_FOUNDRY_ONTOLOGY_RID%" />
    <title>Ontology SDK + React</title>
  </head>
  <body>
    <div id="root-container">
      <div id="root"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
