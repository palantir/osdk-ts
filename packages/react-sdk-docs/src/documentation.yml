            }
      callFunction:
        - template: |-
            import { {{funcApiName}} } from "{{{packageName}}}";
            import { useOsdkFunction } from "@osdk/react/experimental";

            function {{funcApiName}}Caller() {
              const { execute, data, isLoading, error } = useOsdkFunction({{funcApiName}});

              return (
                <div>
                  {error && <div>Error: {error.message}</div>}
                  <button onClick={() => execute({ /* params */ })} disabled={isLoading}>
                    {isLoading ? "Running..." : "Run Function"}
                  </button>
                  {data && <pre>{JSON.stringify(data, null, 2)}</pre>}
                </div>
              );
            }
