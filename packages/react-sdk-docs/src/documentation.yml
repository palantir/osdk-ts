      uploadAttachment:
        - template: |-
            import { useOsdkClient } from "@osdk/react/experimental";
            import { createAttachmentUpload } from "@osdk/client";
            import { {{actionApiName}} } from "{{{packageName}}}";

            function AttachmentUploader() {
              const client = useOsdkClient();

              const handleUpload = async (file: File) => {
                const attachment = createAttachmentUpload(file, file.name);
                await client({{actionApiName}}).applyAction({
                  {{primaryKeyPropertyV2.apiName}}: {{{propertyValueV2}}},
                  {{property}}: attachment
                });
              };

              return (
                <input type="file" onChange={e => {
                  const file = e.target.files?.[0];
                  if (file) {
                    handleUpload(file);
                  }
                }} />
              );
            }
          computedVariables:
            - propertyValueV2
            - primaryKeyPropertyV2
      readMedia:
        - template: |-
            import { {{objectType}} } from "{{{packageName}}}";
            import { useOsdkObject } from "@osdk/react/experimental";
            import { useEffect, useState } from "react";

            function {{objectType}}Media({ primaryKey }: { primaryKey: string }) {
              const { data: obj } = useOsdkObject({{objectType}}, primaryKey);
              const [mediaUrl, setMediaUrl] = useState<string | null>(null);

              useEffect(() => {
                let url: string | undefined;
                const loadMedia = async () => {
                  const contents = await obj?.{{property}}?.fetchContents();
                  if (contents?.ok) {
                    const blob = await contents.blob();
                    url = URL.createObjectURL(blob);
                    setMediaUrl(url);
                  }
                };
                if (obj) {
                  loadMedia();
                }
                return () => { if (url) { URL.revokeObjectURL(url); } };
              }, [obj]);

              return (
                <div>
                  {mediaUrl && <a href={mediaUrl} download>Download media</a>}
                </div>
              );
            }
      uploadMedia:
        - template: |-
            import { useOsdkClient } from "@osdk/react/experimental";
            import { __EXPERIMENTAL__NOT_SUPPORTED_YET__createMediaReference } from "@osdk/api/unstable";
            import type { MediaReference } from "@osdk/api";
            import { {{actionApiName}}, {{objectType}} } from "{{{packageName}}}";

            function MediaUploader() {
              const client = useOsdkClient();

              const handleUpload = async (file: File) => {
                const mediaReference: MediaReference = await client(
                  __EXPERIMENTAL__NOT_SUPPORTED_YET__createMediaReference,
                ).createMediaReference({
                  data: file,
                  fileName: file.name,
                  objectType: {{objectType}},
                  propertyType: "{{property}}",
                });
                await client({{actionApiName}}).applyAction({
                  {{primaryKeyPropertyV2.apiName}}: {{{propertyValueV2}}},
                  {{mediaParameter}}: mediaReference
                });
              };

              return (
                <input type="file" onChange={e => {
                  const file = e.target.files?.[0];
                  if (file) {
                    handleUpload(file);
                  }
                }} />
              );
            }
          computedVariables:
            - propertyValueV2
            - primaryKeyPropertyV2
      uploadMediaOntologyEdits:
        - template: |-
            import { useOsdkClient } from "@osdk/react/experimental";
            import { {{objectType}} } from "{{{packageName}}}";
            import { createEditBatch, uploadMedia } from "@osdk/functions";

            function MediaOntologyEditsUploader() {
              const client = useOsdkClient();

              const handleUpload = async (file: File) => {
                const batch = createEditBatch(client);
                const mediaReference = await uploadMedia(client, { data: file, fileName: file.name });
                // @ts-ignore
                batch.create({{objectType}}, { myMediaProperty: mediaReference });
                return batch.getEdits();
              };

              return (
                <input type="file" onChange={e => {
                  const file = e.target.files?.[0];
                  if (file) {
                    handleUpload(file);
                  }
                }} />
              );
            }
      derivedPropertyNumericExpression:
        - template: |-
            import { {{objectType}} } from "{{{packageName}}}";
            import { useOsdkClient, useObjectSet } from "@osdk/react/experimental";
            import { useMemo } from "react";

            function {{objectType}}DerivedNumericExpression() {
              const client = useOsdkClient();
              const derivedSet = useMemo(() =>
                client({{objectType}}).withProperties({
                  {{^isUnary}}
                  "newPropertyName": (baseObjectSet) =>
                    baseObjectSet.pivotTo("{{linkApiName}}")
                      .aggregate("{{property}}").{{operation}}(
                        baseObjectSet.pivotTo("{{linkApiName}}").aggregate("$count"))
                  {{/isUnary}}
                  {{#isUnary}}
                  "{{operation}}_{{property}}": (baseObjectSet) =>
                    baseObjectSet.pivotTo("{{linkApiName}}")
                      .selectProperty("{{property}}").{{operation}}()
                  {{/isUnary}}
                }), [client]);

              const { data, isLoading, error } = useObjectSet(derivedSet);

              return (
                <div>
                  {error && <div>Error: {error.message}</div>}
                  {isLoading && !data && <div>Loading...</div>}
                  <ul>
                    {data?.map(obj => <li key={obj.$primaryKey}>{obj.$primaryKey}</li>)}
                  </ul>
                </div>
              );
            }
