      applyAction:
        - template: |-
            import { {{actionApiName}} } from "{{{packageName}}}";
            import { useOsdkAction } from "@osdk/react/experimental";

            function {{actionApiName}}Button() {
              const { applyAction, isPending, error } = useOsdkAction({{actionApiName}});

