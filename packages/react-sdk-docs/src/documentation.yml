      aggregationTemplate:
        - template: |-
            import { {{objectType}} } from "{{{packageName}}}";
            import { useOsdkAggregation } from "@osdk/react/experimental";

            function {{objectType}}Aggregation() {
              const { data, isLoading, error } = useOsdkAggregation({{objectType}}, {
                where: { {{property}}: { $isNull: false } },
                aggregate: {
                  $select: { $count: "unordered" },
                  $groupBy: { {{property}}: "exact" }
                }
              });

              return (
                <div>
                  {error && <div>Error: {error.message}</div>}
                  {isLoading && data == null && <div>Loading...</div>}
                  {data != null && <pre>{JSON.stringify(data, null, 2)}</pre>}
                </div>
              );
            }
