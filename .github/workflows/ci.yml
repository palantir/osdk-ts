name: CI

env:
  DO_NOT_TRACK: 1

on:
  push:
    branches: 
      - main
      - release/*
      - next
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  cspell:
    name: Check spelling
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install

      - name: Check spelling
        run: pnpm exec turbo run ci:cspell
  
  changesets:
    name: Check for changesets
    if: ${{ github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'changeset-release') }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Check for changesets
        run: |
          git fetch origin main:main
          pnpm exec changeset status --since=origin/main


  build:
    name: Build and Test
    timeout-minutes: 25
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    strategy:
      matrix:
        node: [18, 20, 22, 24] # We need to support any LTS versions since the GA of 2.0, which includes 18.x and up

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-node${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-node${{ matrix.node }}-

      - name: Install dependencies
        run: pnpm install

      # These packages use Vite 7+ or Storybook which require Node 20+, so exclude them on Node 18
      - name: Transpile, typecheck, Lint and test (excluding Vite 7/Storybook packages on Node 18)
        if: matrix.node == 18
        run: pnpm exec turbo check --filter="!@osdk/create-app.template.*" --filter="!@osdk/create-widget.template.*" --filter="!@osdk/widget.vite-plugin" --filter="!@osdk/examples.*" --filter="!@psdk/examples.*" --filter="!@osdk/e2e.sandbox.todowidget" --filter="!@osdk/ontology-explorer-app" --filter="!@osdk/react-components-storybook"

      - name: Transpile, typecheck, Lint and test
        if: matrix.node != 18
        run: pnpm check

      # catches some of the examples that don't have transpile/typecheck tasks
      # These packages use Vite 7+ or Storybook which require Node 20+, so exclude them on Node 18
      - name: Build (excluding Vite 7/Storybook packages on Node 18)
        if: matrix.node == 18
        run: pnpm exec turbo build --filter="!@osdk/create-app.template.*" --filter="!@osdk/create-widget.template.*" --filter="!@osdk/widget.vite-plugin" --filter="!@osdk/examples.*" --filter="!@psdk/examples.*" --filter="!@osdk/e2e.sandbox.todowidget" --filter="!@osdk/ontology-explorer-app" --filter="!@osdk/react-components-storybook"

      - name: Build
        if: matrix.node != 18
        run: pnpm build

      - name: Verify nothing changed
        run: git diff --exit-code

      - name: Verify nothing added
        run: u="$(git ls-files --others --exclude-standard)" && test -z "$u"

  e2e:
    name: E2E Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      verdaccio:
        image: verdaccio/verdaccio
        # options: >-
        #   --health-cmd "curl -f http://localhost:4873/"
        #   --health-interval 5s

        ports:
          - 4873:4873

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install

      - name: Transpile # the build step will catch lint and co errors
        run: pnpm exec turbo transpile

      - name: Setup Verdaccio
        run: |
          npx npm-auth-to-token -u verdaccio -p fake -e fake@palantir.com -r http://localhost:4873
          npm config set registry http://localhost:4873

      - name: Faux Release
        run: pnpm exec changeset version

      - name: Faux Publish
        run: pnpm publish -r --no-git-checks

  bundle-size:
    name: Bundle Size
    if: github.event_name == 'pull_request'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install and build (PR)
        run: pnpm install && pnpm exec turbo transpile

      - name: Measure bundle size (PR)
        run: npx size-limit --json > /tmp/current.json || true

      - name: Analyze bundle breakdown (PR)
        run: |
          node scripts/analyze-bundle.mjs /tmp/current-breakdown.json || true
          cp scripts/analyze-bundle.mjs /tmp/analyze-bundle.mjs

      - name: Checkout base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1
          git checkout ${{ github.event.pull_request.base.sha }}

      - name: Install and build (base)
        run: pnpm install && pnpm exec turbo transpile

      - name: Measure bundle size (base)
        run: npx size-limit --json > /tmp/base.json || true

      - name: Analyze bundle breakdown (base)
        run: node /tmp/analyze-bundle.mjs /tmp/base-breakdown.json || true

      - name: Compare and comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e '
            const fs = require("fs");

            function formatBytes(bytes) {
              if (bytes === 0) return "0 B";
              const units = ["B", "kB", "MB"];
              const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
              const value = bytes / Math.pow(1024, i);
              return value.toFixed(i === 0 ? 0 : 2) + " " + units[i];
            }

            function formatChange(current, base) {
              if (base === 0) return current === 0 ? "0%" : "new";
              const pct = ((current - base) / base) * 100;
              if (Math.abs(pct) < 0.01) return "0%";
              const sign = pct > 0 ? "+" : "";
              const emoji = pct > 0 ? " 🔺" : " 🔽";
              return sign + pct.toFixed(2) + "%" + emoji;
            }

            function formatDiff(cur, bas) {
              if (bas === 0 && cur > 0) return "+" + formatBytes(cur) + " 🆕";
              if (cur === 0 && bas > 0) return "-" + formatBytes(bas) + " 🗑️";
              const diff = cur - bas;
              if (Math.abs(diff) < 10) return "—";
              const sign = diff > 0 ? "+" : "";
              return sign + formatBytes(Math.abs(diff)) + (diff > 0 ? " 🔺" : " 🔽");
            }

            let current = [], base = [];
            try { current = JSON.parse(fs.readFileSync("/tmp/current.json", "utf8")); } catch {}
            try { base = JSON.parse(fs.readFileSync("/tmp/base.json", "utf8")); } catch {}

            let curBreakdown = [], baseBreakdown = [];
            try { curBreakdown = JSON.parse(fs.readFileSync("/tmp/current-breakdown.json", "utf8")); } catch {}
            try { baseBreakdown = JSON.parse(fs.readFileSync("/tmp/base-breakdown.json", "utf8")); } catch {}

            const baseMap = Object.fromEntries(base.map(e => [e.name, e.size]));
            const currentMap = Object.fromEntries(current.map(e => [e.name, e.size]));
            const allNames = [...new Set([...base.map(e => e.name), ...current.map(e => e.name)])];

            const curBdMap = Object.fromEntries(curBreakdown.map(e => [e.name, e.breakdown]));
            const baseBdMap = Object.fromEntries(baseBreakdown.map(e => [e.name, e.breakdown]));

            let md = "## size-limit report 📦\n\n";
            md += "| Path | Size | Change |\n";
            md += "|------|------|--------|\n";

            const changedEntries = [];
            for (const name of allNames) {
              const cur = currentMap[name] ?? 0;
              const bas = baseMap[name] ?? 0;
              const change = formatChange(cur, bas);
              md += "| \`" + name + "\` | " + formatBytes(cur) + " | " + change + " |\n";
              const absDiff = Math.abs(cur - bas);
              const pctDiff = bas > 0 ? Math.abs((cur - bas) / bas) * 100 : (cur > 0 ? 100 : 0);
              if (absDiff > 100 || pctDiff > 1) {
                changedEntries.push({ name, change });
              }
            }

            // Add bundle breakdown details for changed entries
            for (const { name, change } of changedEntries) {
              const curBd = curBdMap[name] || [];
              const baseBd = baseBdMap[name] || [];
              if (curBd.length === 0 && baseBd.length === 0) continue;

              const curPkgMap = Object.fromEntries(curBd.map(e => [e.package, e.bytes]));
              const basePkgMap = Object.fromEntries(baseBd.map(e => [e.package, e.bytes]));
              const allPkgs = [...new Set([...curBd.map(e => e.package), ...baseBd.map(e => e.package)])];

              // Sort by current bytes descending
              allPkgs.sort((a, b) => (curPkgMap[b] || 0) - (curPkgMap[a] || 0));

              md += "\n<details>\n";
              md += "<summary><code>" + name + "</code> — bundle breakdown (" + change + ")</summary>\n\n";
              md += "| Package | PR Size | Base Size | Diff |\n";
              md += "|---------|---------|-----------|------|\n";

              const topN = allPkgs.slice(0, 10);
              for (const pkg of topN) {
                const cur = curPkgMap[pkg] || 0;
                const bas = basePkgMap[pkg] || 0;
                md += "| \`" + pkg + "\` | " + formatBytes(cur) + " | " + formatBytes(bas) + " | " + formatDiff(cur, bas) + " |\n";
              }

              if (allPkgs.length > 10) {
                const rest = allPkgs.slice(10);
                const restCur = rest.reduce((s, p) => s + (curPkgMap[p] || 0), 0);
                const restBas = rest.reduce((s, p) => s + (basePkgMap[p] || 0), 0);
                md += "| *(" + rest.length + " more)* | " + formatBytes(restCur) + " | " + formatBytes(restBas) + " | " + formatDiff(restCur, restBas) + " |\n";
              }

              md += "\n</details>\n";
            }

            fs.writeFileSync("/tmp/comment.md", md);
          '

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --jq '.[] | select(.body | startswith("## size-limit report")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -X PATCH -f body="$(cat /tmp/comment.md)"
          else
            gh pr comment "${{ github.event.pull_request.number }}" -F /tmp/comment.md
          fi
