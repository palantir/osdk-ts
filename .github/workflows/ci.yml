name: CI

env:
  DO_NOT_TRACK: 1

on:
  push:
    branches: 
      - main
      - release/*
      - next
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  changesets:
    name: Check for changesets
    if: ${{ github.event_name == 'pull_request' && !startsWith(github.event.pull_request.head.ref, 'changeset-release') }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Check for changesets
        run: |
          git fetch origin main:main
          pnpm exec changeset status --since=origin/main


  # Build all artifacts once on a single Node version. tsc/babel/esbuild emit
  # identical output regardless of the host Node version (the build target is
  # controlled by tsconfig `target` / tsup `target`, not the runtime), so a
  # build matrix produces the same bytes 4x. Node-18 syntax compatibility is
  # guaranteed by the ES2022 build target and proven by the `test` matrix below.
  # The turbo cache populated here is consumed by the `test` jobs.
  build:
    name: Build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    outputs:
      # Reused by build-apps so it doesn't have to re-detect infra changes.
      infra_changed: ${{ steps.infra.outputs.changed }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-build-

      - name: Install dependencies
        run: pnpm install

      # Detect if repo infrastructure files changed. When they do, we build
      # with --force so it can't silently rely on stale cached artifacts
      # (which would mask broken task dependencies). The test jobs consume this
      # job's turbo cache, so the artifacts produced here must be correct.
      - name: Detect infra changes
        id: infra
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if git diff --name-only "$BASE_SHA" HEAD -- \
            turbo.json \
            package.json \
            pnpm-workspace.yaml \
            pnpm-lock.yaml \
            config/tsconfig.base.json \
            babel.config.mjs \
            dprint.json \
            .github/workflows/ci.yml \
            .github/workflows/release.yml \
            | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # transpile + transpileTypes produce build/{esm,cjs,browser,types} for all
      # packages — the artifacts the test matrix and the checks consume. The
      # app/site builds (Storybook, examples, sandboxes) run separately in the
      # build-apps job so the slow Storybook build does not sit on the test
      # matrix's critical path. No Node-18 exclusions here (runs on Node 24).
      - name: Build all artifacts
        run: pnpm exec turbo run transpile transpileTypes ${{ steps.infra.outputs.changed == 'true' && '--force' || '' }}

      - name: Verify nothing changed
        run: git diff --exit-code

      - name: Verify nothing added
        run: u="$(git ls-files --others --exclude-standard)" && test -z "$u"

  # The Node-version-independent checks (no per-Node output) are split into three
  # parallel jobs instead of one, because on a single runner typecheck, lint,
  # cspell and the api/attw checks contend for CPU and serialize (check-attw also
  # tails behind typecheck). Each job `needs: build` and restores the build cache,
  # so transpile/transpileTypes are cache hits (no recompile). The check phase's
  # wall-clock then ≈ the slowest of the three rather than their sum.

  # Typecheck + the checks that pack/analyze build output. check-attw/check-api/
  # check-bundle depend on transpile/typecheck, so they're grouped with typecheck
  # (typecheck has no cached outputs; splitting it out would just re-run it here).
  typecheck:
    name: Typecheck and API checks
    needs: build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      # Own per-job cache so typecheck/attw results persist across runs (warm).
      # restore-keys fall back to a prior typecheck cache first, then this run's
      # build cache (cold first run), then any prior build cache.
      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-typecheck-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-typecheck-
            turbo-${{ runner.os }}-build-${{ github.sha }}
            turbo-${{ runner.os }}-build-

      - name: Install dependencies
        run: pnpm install

      # Materialize build/{esm,cjs,browser,types} from the build cache (cache
      # hits) so check-attw (which packs them) finds everything, avoiding a race
      # with the tasks that produce them.
      - name: Restore build artifacts from cache
        run: pnpm exec turbo run transpile transpileTypes

      - name: Typecheck and API checks
        run: pnpm exec turbo run typecheck check-attw check-api check-bundle

      - name: Verify nothing changed
        run: git diff --exit-code

      - name: Verify nothing added
        run: u="$(git ls-files --others --exclude-standard)" && test -z "$u"

  lint:
    name: Lint
    needs: build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      # Own per-job cache so lint results persist across runs (warm). restore-keys
      # fall back to a prior lint cache first, then this run's build cache (cold
      # first run), then any prior build cache.
      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-lint-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-lint-
            turbo-${{ runner.os }}-build-${{ github.sha }}
            turbo-${{ runner.os }}-build-

      - name: Install dependencies
        run: pnpm install

      # lint dependsOn ^transpileTypes (deps' .d.ts for type-aware rules); restore
      # the build artifacts from cache so those are present.
      - name: Restore build artifacts from cache
        run: pnpm exec turbo run transpile transpileTypes

      - name: Lint and monorepolint
        run: pnpm exec turbo run lint //#check-mrl

      - name: Verify nothing changed
        run: git diff --exit-code

      - name: Verify nothing added
        run: u="$(git ls-files --others --exclude-standard)" && test -z "$u"

  cspell:
    name: Spelling
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      # Single whole-repo cspell pass (ci:cspell -> cspell . --quiet). This
      # supersedes the per-package check-spelling task, so we don't run both.
      - name: Check spelling
        run: pnpm exec turbo run ci:cspell

  # The load-bearing matrix: run the test suites against the artifacts built by
  # the `build` job under every supported Node version. This is what actually
  # proves the published packages run on Node 18 (and up).
  test:
    name: Test (Node ${{ matrix.node }})
    needs: build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24] # We need to support any LTS versions since the GA of 2.0, which includes 18.x and up

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      # Own per-job cache, keyed PER NODE VERSION so test results aren't shared
      # across the matrix legs (turbo's hash doesn't encode the Node runtime, so a
      # shared cache could restore another version's result and defeat the matrix).
      # restore-keys warm from this node's prior test cache, else this run's build
      # cache (cold first run), else any prior build cache.
      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-test-node${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-test-node${{ matrix.node }}-
            turbo-${{ runner.os }}-build-${{ github.sha }}
            turbo-${{ runner.os }}-build-

      - name: Install dependencies
        run: pnpm install

      # Materialize the full build output before testing. `turbo run test` only
      # depends on `^transpileEsm`, but some tests consume dependencies' other
      # build outputs too (e.g. tests.verify-webpack-bundling bundles against
      # build/browser, the verify-cjs/esm tests against build/cjs and build/esm).
      # Running transpile + transpileTypes restores build/{esm,cjs,browser,types}
      # for every package from the build job's cache (cache hits, no real
      # recompilation), and because `transpile` dependsOn `codegen` it also
      # regenerates the source files (generatedNoCheck/) that tests import but
      # that `codegen` does not cache. This runs to completion before the tests.
      - name: Restore build artifacts from cache (excluding Vite 7/Storybook packages on Node 18)
        if: matrix.node == 18
        run: pnpm exec turbo run transpile transpileTypes --filter="!@osdk/create-app.template.*" --filter="!@osdk/create-widget.template.*" --filter="!@osdk/widget.vite-plugin" --filter="!@osdk/examples.*" --filter="!@psdk/examples.*" --filter="!@osdk/e2e.sandbox.todowidget" --filter="!@osdk/ontology-explorer-app" --filter="!@osdk/react-components-storybook"

      - name: Restore build artifacts from cache
        if: matrix.node != 18
        run: pnpm exec turbo run transpile transpileTypes

      # @osdk/react-components is excluded here and run on its own below: it has a
      # large happy-dom suite, and when it competes with the other ~80 test
      # processes for CPU its vitest main thread is starved enough to trip the
      # worker RPC timeout ("Timeout calling onTaskUpdate") on the slowest matrix
      # leg. Running it isolated keeps the runner uncontended for it.
      # The other --filter exclusions are Vite 7+/Storybook packages that need Node 20+.
      - name: Test (excluding Vite 7/Storybook packages on Node 18, and react-components)
        if: matrix.node == 18
        run: pnpm exec turbo run test --filter="!@osdk/react-components" --filter="!@osdk/create-app.template.*" --filter="!@osdk/create-widget.template.*" --filter="!@osdk/widget.vite-plugin" --filter="!@osdk/examples.*" --filter="!@psdk/examples.*" --filter="!@osdk/e2e.sandbox.todowidget" --filter="!@osdk/ontology-explorer-app" --filter="!@osdk/react-components-storybook"

      - name: Test (excluding react-components)
        if: matrix.node != 18
        run: pnpm exec turbo run test --filter="!@osdk/react-components"

      # Run react-components on its own (all Node versions) so it isn't starved by
      # the concurrent test processes above. See the comment on the steps above.
      - name: Test react-components (isolated)
        run: pnpm exec turbo run test --filter="@osdk/react-components"

  # Build the app/site packages (Storybook, examples, sandboxes, docs) that have
  # no transpile/typecheck task — `turbo run build` is what proves they still
  # compile. Runs in parallel with the test matrix (the matrix does NOT depend on
  # it), so the slow Storybook build doesn't delay tests. Reuses the build job's
  # turbo cache, so only the app builds run (their transpiled deps are cache hits).
  build-apps:
    name: Build apps
    needs: build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      # Own per-job cache so the app/site builds persist across runs (warm).
      # Key prefix is "apps-" (not "build-apps-") so it does not collide with the
      # "turbo-…-build-" restore-key used by the build/typecheck/lint/test jobs.
      # restore-keys fall back to a prior apps cache, then this run's build cache
      # (cold first run), then any prior build cache.
      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-apps-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-apps-
            turbo-${{ runner.os }}-build-${{ github.sha }}
            turbo-${{ runner.os }}-build-

      - name: Install dependencies
        run: pnpm install

      # Runs on Node 24, so no Node-18 Vite 7/Storybook exclusions are needed.
      - name: Build apps and sites
        run: pnpm exec turbo run build ${{ needs.build.outputs.infra_changed == 'true' && '--force' || '' }}

      - name: Verify nothing changed
        run: git diff --exit-code

      - name: Verify nothing added
        run: u="$(git ls-files --others --exclude-standard)" && test -z "$u"

  e2e:
    name: E2E Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      verdaccio:
        image: verdaccio/verdaccio
        # options: >-
        #   --health-cmd "curl -f http://localhost:4873/"
        #   --health-interval 5s

        ports:
          - 4873:4873

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install

      - name: Transpile # the build step will catch lint and co errors
        run: pnpm exec turbo transpile

      - name: Setup Verdaccio
        run: |
          npx npm-auth-to-token -u verdaccio -p fake -e fake@palantir.com -r http://localhost:4873
          npm config set registry http://localhost:4873

      - name: Faux Release
        run: pnpm exec changeset version

      - name: Faux Publish
        run: pnpm publish -r --no-git-checks

  changes:
    name: Detect package changes
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # "true" when this push/PR touches the component packages whose stories
      # the interaction tests exercise.
      storybook: ${{ steps.filter.outputs.storybook }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Detect changes to component packages
        id: filter
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"

          # Fail open: if we can't resolve the base commit (e.g. a deeper push
          # than the shallow clone, or the all-zero SHA of a branch's first
          # push), run the tests rather than risk skipping a relevant change.
          if [ -z "$BASE_SHA" ] || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            echo "Base commit '$BASE_SHA' unavailable; running storybook tests."
            echo "storybook=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BASE_SHA" HEAD -- \
            packages/react-components \
            packages/react-components-storybook \
            | grep -q .; then
            echo "storybook=true" >> "$GITHUB_OUTPUT"
          else
            echo "storybook=false" >> "$GITHUB_OUTPUT"
          fi

  storybook-tests:
    name: Storybook Interaction Tests
    needs: changes
    if: needs.changes.outputs.storybook == 'true'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install

      # The stories import the browser build of the workspace packages they
      # render, so those must be transpiled before the tests run.
      - name: Transpile story dependencies
        run: pnpm exec turbo transpileBrowser --filter='@osdk/react-components-storybook^...'

      # Vitest browser mode runs the play functions in headless Chromium.
      - name: Install Playwright Chromium
        run: pnpm --filter @osdk/react-components-storybook exec playwright install --with-deps chromium

      - name: Run interaction tests
        run: pnpm --filter @osdk/react-components-storybook test-storybook

  bundle-size:
    name: Bundle Size
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install and build (PR)
        run: pnpm install && pnpm exec turbo transpile

      - name: Measure bundle size (PR)
        run: npx size-limit --json > /tmp/current.json || true

      - name: Checkout base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1
          git checkout ${{ github.event.pull_request.base.sha }}

      - name: Install and build (base)
        run: pnpm exec turbo clean && pnpm install && pnpm exec turbo transpile

      - name: Measure bundle size (base)
        run: npx size-limit --json > /tmp/base.json || true

      - name: Compare and comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e '
            const fs = require("fs");

            function formatBytes(bytes) {
              if (bytes === 0) return "0 B";
              const units = ["B", "kB", "MB"];
              const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
              const value = bytes / Math.pow(1024, i);
              return value.toFixed(i === 0 ? 0 : 2) + " " + units[i];
            }

            function formatChange(current, base) {
              if (base === 0) return current === 0 ? "0%" : "new";
              const pct = ((current - base) / base) * 100;
              if (Math.abs(pct) < 0.01) return "0%";
              const sign = pct > 0 ? "+" : "";
              const emoji = pct > 0 ? " 🔺" : " 🔽";
              return sign + pct.toFixed(2) + "%" + emoji;
            }

            let current = [], base = [];
            try { current = JSON.parse(fs.readFileSync("/tmp/current.json", "utf8")); } catch {}
            try { base = JSON.parse(fs.readFileSync("/tmp/base.json", "utf8")); } catch {}
            if (!Array.isArray(current)) current = [];
            if (!Array.isArray(base)) base = [];

            const baseMap = Object.fromEntries(base.map(e => [e.name, e.size]));
            const currentMap = Object.fromEntries(current.map(e => [e.name, e.size]));
            const allNames = [...new Set([...base.map(e => e.name), ...current.map(e => e.name)])];

            let md = "## size-limit report 📦\n\n";
            md += "| Path | Size | Change |\n";
            md += "|------|------|--------|\n";

            for (const name of allNames) {
              const cur = currentMap[name] ?? 0;
              const bas = baseMap[name] ?? 0;
              const change = formatChange(cur, bas);
              md += "| \`" + name + "\` | " + formatBytes(cur) + " | " + change + " |\n";
            }

            fs.writeFileSync("/tmp/comment.md", md);
          '

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --jq '.[] | select(.body | startswith("## size-limit report")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -X PATCH -f body="$(cat /tmp/comment.md)"
          else
            gh pr comment "${{ github.event.pull_request.number }}" -F /tmp/comment.md
          fi

  fork-guard:
    name: Fork sensitive-paths guard
    # Only fork PRs need this check; for in-repo PRs and push events we trust the author
    # and the job becomes a no-op success.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out code
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Guard install-time config from fork PRs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BYPASS_LABEL: safe-to-test
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          # Maintainer override: if the PR carries the bypass label, accept.
          if echo "$PR_LABELS" | grep -q "\"$BYPASS_LABEL\""; then
            echo "Bypass label '$BYPASS_LABEL' is set; skipping sensitive-paths check."
            exit 0
          fi

          git fetch origin "$BASE_SHA" --depth=1
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED"
          echo "---"

          violations=()

          # Direct sensitive paths
          while IFS= read -r f; do
            case "$f" in
              .npmrc|pnpm-workspace.yaml)
                violations+=("$f (install-time config)")
                ;;
              .github/workflows/*)
                violations+=("$f (CI workflow)")
                ;;
            esac
          done <<< "$CHANGED"

          # Lockfile changed without any package.json change: classic tampering signal
          if echo "$CHANGED" | grep -qx "pnpm-lock.yaml"; then
            if ! echo "$CHANGED" | grep -q "package.json$"; then
              violations+=("pnpm-lock.yaml changed without any package.json change")
            fi
          fi

          # Root package.json pnpm field changed (overrides, onlyBuiltDependencies, etc.)
          if echo "$CHANGED" | grep -qx "package.json"; then
            base_pnpm=$(git show "$BASE_SHA:package.json" | jq -c '.pnpm // {}')
            head_pnpm=$(git show "$HEAD_SHA:package.json" | jq -c '.pnpm // {}')
            if [ "$base_pnpm" != "$head_pnpm" ]; then
              violations+=("package.json 'pnpm' field changed (overrides/onlyBuiltDependencies)")
            fi
          fi

          if [ "${#violations[@]}" -gt 0 ]; then
            echo "::error::This fork PR modifies install-time or CI configuration."
            echo "::error::Maintainer review required. Apply the '$BYPASS_LABEL' label to bypass after review."
            echo ""
            echo "Violations:"
            for v in "${violations[@]}"; do
              echo "  - $v"
            done
            exit 1
          fi

          echo "No sensitive-path modifications detected."

  ci-build:
    name: ci-build
    if: ${{ always() }}
    needs: [build, build-apps, typecheck, lint, cspell, test, e2e, fork-guard]
    runs-on: ubuntu-latest
    steps:
      - name: Verify dependent jobs succeeded
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "build did not succeed: ${{ needs.build.result }}"
            exit 1
          fi
          if [[ "${{ needs.build-apps.result }}" != "success" ]]; then
            echo "build-apps did not succeed: ${{ needs.build-apps.result }}"
            exit 1
          fi
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then
            echo "typecheck did not succeed: ${{ needs.typecheck.result }}"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint did not succeed: ${{ needs.lint.result }}"
            exit 1
          fi
          if [[ "${{ needs.cspell.result }}" != "success" ]]; then
            echo "cspell did not succeed: ${{ needs.cspell.result }}"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test did not succeed: ${{ needs.test.result }}"
            exit 1
          fi
          if [[ "${{ needs.e2e.result }}" != "success" ]]; then
            echo "e2e did not succeed: ${{ needs.e2e.result }}"
            exit 1
          fi
          if [[ "${{ needs.fork-guard.result }}" != "success" ]]; then
            echo "fork-guard did not succeed: ${{ needs.fork-guard.result }}"
            exit 1
          fi
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          # storybook-tests is skipped when no component packages changed; only
          # a real failure (not "skipped") should fail CI.
          if [[ "${{ needs.storybook-tests.result }}" != "success" && "${{ needs.storybook-tests.result }}" != "skipped" ]]; then
            echo "storybook-tests did not succeed: ${{ needs.storybook-tests.result }}"
            exit 1
          fi
