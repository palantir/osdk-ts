name: Cleanup Storybook PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove PR preview from gh-pages
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          git clone --branch gh-pages --single-branch --depth 1 \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-temp

          if [ -d "gh-pages-temp/storybook/pr-${PR_NUMBER}" ]; then
            rm -rf "gh-pages-temp/storybook/pr-${PR_NUMBER}"
            cd gh-pages-temp
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Remove Storybook preview for PR #${PR_NUMBER}" || echo "No changes to commit"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages
          else
            echo "No preview found for PR #${PR_NUMBER}, skipping cleanup"
          fi
